<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jubayed Ahmed — DevOps & Full-Stack Engineer</title>
<meta name="description" content="DevOps & full-stack engineer in Chattogram, Bangladesh.">
<style>
  html,body{margin:0;height:100%;background:#0b0e14;color:#eee;font-family:ui-monospace,'JetBrains Mono',monospace}
  #loading{
    height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    opacity:1;transition:opacity .3s ease;
  }
  #loading .dot{width:8px;height:8px;border-radius:50%;background:#ff5148;animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  #loading span{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  noscript{display:block;padding:40px;text-align:center;font-family:sans-serif}
</style>
</head>
<body>
<div id="loading"><div class="dot"></div><span>Loading portfolio</span></div>
<noscript>
  <p>This portfolio picks a random design and needs JavaScript enabled.
  You can view a design directly: <a href="designs/bento.html">Bento</a> ·
  <a href="designs/manifest.html">Manifest</a> · <a href="designs/console.html">Console</a> ·
  <a href="designs/pipeline.html">Pipeline</a></p>
</noscript>
<script>
  // One of these is picked at random on every fresh visit.
  // Add or remove filenames here to change the rotation.
  var DESIGNS = [
    'designs/manifest.html',
    'designs/console.html',
    'designs/pipeline.html',
    'designs/bento.html'
  ];

  // Never repeat the same design twice in a row within one browser tab session.
  var last = sessionStorage.getItem('lastDesign');
  var pool = DESIGNS.filter(function(d){ return d !== last; });
  if (pool.length === 0) pool = DESIGNS;

  var pick = pool[Math.floor(Math.random() * pool.length)];

  // Support ?design=console.html style manual overrides for sharing a specific look.
  var params = new URLSearchParams(location.search);
  var forced = params.get('design');
  if (forced && DESIGNS.indexOf('designs/' + forced) !== -1) {
    pick = 'designs/' + forced;
  }

  sessionStorage.setItem('lastDesign', pick);

  // Fetch the chosen design and inject it in place, rather than redirecting,
  // so the address bar stays fixed at the root URL instead of flashing to
  // /designs/whatever.html.
  fetch(pick, { cache: 'no-store' })
    .then(function (res) {
      if (!res.ok) throw new Error('Failed to load design: ' + res.status);
      return res.text();
    })
    .then(function (html) {
      // Rewrite the page in place. This re-parses the fetched markup as the
      // live document (including its <style> and <script> tags) while the
      // URL in the address bar is left untouched.
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function (err) {
      // Fallback: if fetch fails (e.g. opened via file://), fall back to a
      // normal navigation so the site still works.
      console.error(err);
      location.replace(pick);
    });
</script>
</body>
</html>
